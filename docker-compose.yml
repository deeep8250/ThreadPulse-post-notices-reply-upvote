services:
 app:
  build: .
  ports:
   - "8000:8080"
  env_file:
   - .env
  depends_on:
   - db
   - redis

 db:
  image: postgres:15-alpine
  ports: 
   - "5433:${DB_PORT}"
  environment:
   POSTGRES_USER: ${DB_USER}
   POSTGRES_PASSWORD: ${DB_PASSWORD}
   POSTGRES_DB: ${DB_NAME}
  volumes:
    - postgres_data:/var/lib/postgresql/data 

       

 redis:
  image: redis:7-alpine
  ports:
  - "6379:6379"

volumes:
     postgres_data:  